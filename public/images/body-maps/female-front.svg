<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none">
  <!-- 女性正面人体轮廓 — 较窄肩宽、较宽臀部 -->
  <g id="body-outline" stroke="#d1d5db" stroke-width="1.5" fill="#f9fafb">
    <!-- 头部 -->
    <ellipse cx="200" cy="60" rx="38" ry="46" />
    <!-- 颈部 -->
    <rect x="187" y="106" width="26" height="24" rx="5" />
    <!-- 躯干 — 沙漏形 -->
    <path d="M148 130 Q140 170 142 210 Q144 250 138 280 Q135 310 140 340 Q148 370 155 400 H245 Q252 370 260 340 Q265 310 262 280 Q256 250 258 210 Q260 170 252 130 Z" />
    <!-- 左臂 -->
    <path d="M148 130 Q120 138 107 175 Q92 225 90 280 Q88 310 92 340 L105 340 Q108 310 108 280 Q108 235 120 190 Q130 160 148 150" />
    <!-- 右臂 -->
    <path d="M252 130 Q280 138 293 175 Q308 225 310 280 Q312 310 308 340 L295 340 Q292 310 292 280 Q292 235 280 190 Q270 160 252 150" />
    <!-- 左手 -->
    <ellipse cx="98" cy="355" rx="14" ry="20" />
    <!-- 右手 -->
    <ellipse cx="302" cy="355" rx="14" ry="20" />
    <!-- 左腿 -->
    <path d="M155 400 Q152 450 150 520 Q148 580 150 640 Q152 680 148 740 L152 760 H180 L178 740 Q180 680 180 640 Q180 580 178 520 Q176 450 173 400 Z" />
    <!-- 右腿 -->
    <path d="M227 400 Q224 450 222 520 Q220 580 220 640 Q220 680 222 740 L220 760 H248 L252 740 Q248 680 250 640 Q252 580 250 520 Q248 450 245 400 Z" />
    <!-- 左脚 -->
    <ellipse cx="166" cy="772" rx="18" ry="11" />
    <!-- 右脚 -->
    <ellipse cx="234" cy="772" rx="18" ry="11" />
  </g>

  <!-- 肌群热区 -->
  <g id="muscle-regions">
    <!-- 三角肌前束（左） -->
    <ellipse data-muscle-id="deltoid-anterior" cx="145" cy="148" rx="16" ry="20" fill="#93c5fd" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1" class="muscle-zone" />
    <!-- 三角肌前束（右） -->
    <ellipse data-muscle-id="deltoid-anterior" cx="255" cy="148" rx="16" ry="20" fill="#93c5fd" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1" class="muscle-zone" />

    <!-- 三角肌中束（左） -->
    <ellipse data-muscle-id="deltoid-lateral" cx="132" cy="152" rx="10" ry="16" fill="#86efac" fill-opacity="0.5" stroke="#22c55e" stroke-width="1" class="muscle-zone" />
    <!-- 三角肌中束（右） -->
    <ellipse data-muscle-id="deltoid-lateral" cx="268" cy="152" rx="10" ry="16" fill="#86efac" fill-opacity="0.5" stroke="#22c55e" stroke-width="1" class="muscle-zone" />

    <!-- 胸大肌（左） -->
    <ellipse data-muscle-id="pectoralis-major" cx="173" cy="180" rx="28" ry="22" fill="#fca5a5" fill-opacity="0.5" stroke="#ef4444" stroke-width="1" class="muscle-zone" />
    <!-- 胸大肌（右） -->
    <ellipse data-muscle-id="pectoralis-major" cx="227" cy="180" rx="28" ry="22" fill="#fca5a5" fill-opacity="0.5" stroke="#ef4444" stroke-width="1" class="muscle-zone" />

    <!-- 胸小肌（左） -->
    <ellipse data-muscle-id="pectoralis-minor" cx="170" cy="190" rx="16" ry="12" fill="#fda4af" fill-opacity="0.4" stroke="#f43f5e" stroke-width="1" stroke-dasharray="3 2" class="muscle-zone" />
    <!-- 胸小肌（右） -->
    <ellipse data-muscle-id="pectoralis-minor" cx="230" cy="190" rx="16" ry="12" fill="#fda4af" fill-opacity="0.4" stroke="#f43f5e" stroke-width="1" stroke-dasharray="3 2" class="muscle-zone" />

    <!-- 肱二头肌（左） -->
    <ellipse data-muscle-id="biceps" cx="118" cy="218" rx="12" ry="28" fill="#fdba74" fill-opacity="0.5" stroke="#f97316" stroke-width="1" class="muscle-zone" />
    <!-- 肱二头肌（右） -->
    <ellipse data-muscle-id="biceps" cx="282" cy="218" rx="12" ry="28" fill="#fdba74" fill-opacity="0.5" stroke="#f97316" stroke-width="1" class="muscle-zone" />

    <!-- 前臂肌群（左） -->
    <ellipse data-muscle-id="forearm" cx="105" cy="290" rx="10" ry="32" fill="#d8b4fe" fill-opacity="0.5" stroke="#a855f7" stroke-width="1" class="muscle-zone" />
    <!-- 前臂肌群（右） -->
    <ellipse data-muscle-id="forearm" cx="295" cy="290" rx="10" ry="32" fill="#d8b4fe" fill-opacity="0.5" stroke="#a855f7" stroke-width="1" class="muscle-zone" />

    <!-- 腹直肌 -->
    <rect data-muscle-id="rectus-abdominis" x="180" y="220" width="40" height="85" rx="8" fill="#fde68a" fill-opacity="0.5" stroke="#eab308" stroke-width="1" class="muscle-zone" />

    <!-- 腹外斜肌（左） -->
    <path data-muscle-id="external-oblique" d="M152 238 Q160 232 178 236 L175 310 Q160 318 148 305 Z" fill="#bef264" fill-opacity="0.5" stroke="#84cc16" stroke-width="1" class="muscle-zone" />
    <!-- 腹外斜肌（右） -->
    <path data-muscle-id="external-oblique" d="M248 238 Q240 232 222 236 L225 310 Q240 318 252 305 Z" fill="#bef264" fill-opacity="0.5" stroke="#84cc16" stroke-width="1" class="muscle-zone" />

    <!-- 腹横肌（左） -->
    <path data-muscle-id="transverse-abdominis" d="M146 265 Q153 260 168 263 L166 305 Q153 310 144 300 Z" fill="#a7f3d0" fill-opacity="0.4" stroke="#10b981" stroke-width="1" stroke-dasharray="3 2" class="muscle-zone" />
    <!-- 腹横肌（右） -->
    <path data-muscle-id="transverse-abdominis" d="M254 265 Q247 260 232 263 L234 305 Q247 310 256 300 Z" fill="#a7f3d0" fill-opacity="0.4" stroke="#10b981" stroke-width="1" stroke-dasharray="3 2" class="muscle-zone" />

    <!-- 股四头肌（左） -->
    <ellipse data-muscle-id="quadriceps" cx="165" cy="480" rx="20" ry="60" fill="#93c5fd" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1" class="muscle-zone" />
    <!-- 股四头肌（右） -->
    <ellipse data-muscle-id="quadriceps" cx="235" cy="480" rx="20" ry="60" fill="#93c5fd" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1" class="muscle-zone" />

    <!-- 内收肌群（左） -->
    <ellipse data-muscle-id="adductors" cx="180" cy="470" rx="9" ry="45" fill="#c4b5fd" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1" class="muscle-zone" />
    <!-- 内收肌群（右） -->
    <ellipse data-muscle-id="adductors" cx="220" cy="470" rx="9" ry="45" fill="#c4b5fd" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1" class="muscle-zone" />
  </g>

  <!-- 肌群标签 -->
  <g id="muscle-labels" font-size="9" fill="#374151" text-anchor="middle" font-family="system-ui, sans-serif">
    <text x="145" y="118">三角肌前束</text>
    <text x="255" y="118">三角肌前束</text>
    <text x="115" y="138">中束</text>
    <text x="285" y="138">中束</text>
    <text x="173" y="165">胸大肌</text>
    <text x="227" y="165">胸大肌</text>
    <text x="170" y="205">胸小肌</text>
    <text x="230" y="205">胸小肌</text>
    <text x="102" y="212">肱二头肌</text>
    <text x="298" y="212">肱二头肌</text>
    <text x="90" y="285">前臂</text>
    <text x="310" y="285">前臂</text>
    <text x="200" y="255">腹直肌</text>
    <text x="158" y="270">腹外斜肌</text>
    <text x="242" y="270">腹外斜肌</text>
    <text x="150" y="290">腹横肌</text>
    <text x="250" y="290">腹横肌</text>
    <text x="165" y="430">股四头肌</text>
    <text x="235" y="430">股四头肌</text>
    <text x="200" y="445">内收肌群</text>
  </g>
</svg>
